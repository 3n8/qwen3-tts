services:
  qwen3-tts:
    build:
      context: .
      args:
        ROCM_PYTORCH_TAG: rocm6.4.2_ubuntu24.04_py3.12_pytorch_release_2.6.0
    image: qwen3-tts:latest
    container_name: qwen3-tts
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ:-Europe/Oslo}
      - PORT=${PORT:-3004}
      - TTS_API_KEY=${TTS_API_KEY:?TTS_API_KEY is required}
      - HIP_VISIBLE_DEVICES=0
      - HSA_OVERRIDE_GFX_VERSION=
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-1}
      - MAX_CHUNK_CHARS=${MAX_CHUNK_CHARS:-700}
      - HF_REV_BASE=
      - HF_REV_DESIGN=
    volumes:
      - /opt/appdata/qwen3-tts/config:/config
      - /opt/appdata/qwen3-tts/models:/models
      - /opt/appdata/qwen3-tts/voices:/voices
      - /opt/appdata/qwen3-tts/out:/out
      - /opt/appdata/qwen3-tts/hf_cache:/root/.cache/huggingface
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    ipc: host
    group_add:
      - video
      - render
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=false"

  qwen3-tts-traefik:
    image: qwen3-tts:latest
    container_name: qwen3-tts-traefik
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ:-Europe/Oslo}
      - PORT=3004
      - TTS_API_KEY=${TTS_API_KEY:?TTS_API_KEY is required}
      - HIP_VISIBLE_DEVICES=0
      - HSA_OVERRIDE_GFX_VERSION=
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-1}
      - MAX_CHUNK_CHARS=${MAX_CHUNK_CHARS:-700}
      - HF_REV_BASE=
      - HF_REV_DESIGN=
    volumes:
      - /opt/appdata/qwen3-tts/config:/config
      - /opt/appdata/qwen3-tts/models:/models
      - /opt/appdata/qwen3-tts/voices:/voices
      - /opt/appdata/qwen3-tts/out:/out
      - /opt/appdata/qwen3-tts/hf_cache:/root/.cache/huggingface
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    ipc: host
    group_add:
      - video
      - render
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qwen3-tts.rule=Host(`tts.yourdomain.com`)"
      - "traefik.http.routers.qwen3-tts.entrypoints=websecure"
      - "traefik.http.routers.qwen3-tts.tls.certresolver=letsencrypt"
      - "traefik.http.services.qwen3-tts.loadbalancer.server.port=3004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
