[program:qwen3-tts]
command=uvicorn main:app --host 0.0.0.0 --port 3004
directory=/app
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/",PYTHONPATH_APPEND="/app"
stdout_logfile=/config/qwen3-tts.log
stderr_logfile=/config/qwen3-tts.err
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
autorestart=true
startsecs=5
stopwaitsecs=30
